# =============================================================================
# secret.yaml — Secrets Kubernetes (identifiants DB, JWT)
# =============================================================================
#
# OBJECTIF : Stocker les donnees sensibles utilisees par l'API et PostgreSQL.
#
# SECURITE :
# - stringData : permet d'ecrire en clair, K8s encode automatiquement en base64
# - En production : utiliser des outils comme SealedSecrets, Vault, ou External Secrets
# - Les secrets sont stockes en base64 dans etcd (chiffrer at-rest recommande)
#
# RESULTAT ATTENDU :
#   kubectl get secret mini-secrets -n demo  # Doit afficher le secret
#   kubectl get secret mini-secrets -n demo -o jsonpath='{.data.DB_USER}' | base64 -d
#   # Doit afficher "app"
#
# USAGE :
#   kubectl apply -f secret.yaml -n demo
#
# VERIFICATION :
#   kubectl describe secret mini-secrets -n demo  # Affiche les cles (pas les valeurs)
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: mini-secrets
  namespace: demo
type: Opaque
stringData:
  # Identifiants PostgreSQL
  DB_USER: app
  DB_PASSWORD: app
  DB_NAME: app_db
  # Secret JWT (CHANGER EN PRODUCTION !)
  JWT_SECRET: change-me
