# =============================================================================
# api-service.yaml — Service ClusterIP pour l'API
# =============================================================================
#
# OBJECTIF : Exposer l'API en interne avec une IP virtuelle stable.
#
# TYPE CLUSTERIP :
# - IP virtuelle interne au cluster
# - Accessible uniquement depuis les Pods du cluster
# - Load balancing automatique entre les replicas
#
# RESULTAT ATTENDU :
#   kubectl get svc api -n demo  # Doit afficher un ClusterIP
#   kubectl get endpoints api -n demo  # Doit afficher les IPs des 2 pods
#
# USAGE :
#   kubectl apply -f api-service.yaml -n demo
#
# TEST :
#   kubectl run curl --image=curlimages/curl -it --rm -- curl http://api.demo.svc.cluster.local/health
#   # Doit retourner {"status":"ok"}
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: demo
spec:
  selector:
    app: mini
    tier: api
  ports:
    - port: 80           # Port expose par le Service
      targetPort: 8000   # Port du conteneur
  type: ClusterIP        # IP virtuelle interne
