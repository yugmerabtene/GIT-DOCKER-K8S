# =============================================================================
# templates/secret.yaml — Template Helm pour les secrets
# =============================================================================
#
# OBJECTIF : Creer les secrets Kubernetes avec les valeurs du Chart.
#
# TEMPLATING HELM :
# - {{ .Values.db.user }} : remplace par la valeur de values.yaml
# - {{ randAlphaNum 32 }} : genere une chaine aleatoire de 32 caracteres
# - | quote : ajoute des guillemets autour de la valeur
#
# RESULTAT ATTENDU :
#   helm template chart/mini-api  # Doit afficher le Secret avec les valeurs
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: mini-secrets
type: Opaque
stringData:
  DB_USER: {{ .Values.db.user | quote }}
  DB_PASSWORD: {{ .Values.db.password | quote }}
  DB_NAME: {{ .Values.db.name | quote }}
  # Genere un secret JWT aleatoire a chaque installation
  JWT_SECRET: {{ randAlphaNum 32 | quote }}
