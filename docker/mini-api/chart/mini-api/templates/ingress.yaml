# =============================================================================
# templates/ingress.yaml — Template Helm pour l'Ingress
# =============================================================================
#
# CONDITIONNEL HELM :
# - {{- if .Values.ingress.enabled }} : cree l'Ingress uniquement si active
# - {{ .Values.ingress.host }} : nom de domaine depuis values.yaml
# =============================================================================

{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mini
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80
{{- end }}
