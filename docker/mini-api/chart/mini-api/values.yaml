# =============================================================================
# values.yaml — Valeurs par defaut du Chart Helm
# =============================================================================
#
# OBJECTIF : Definir les valeurs par defaut utilisees dans les templates.
#
# PERSONNALISATION :
#   helm install mini chart/mini-api --set image.tag=2.0 --set db.password=secret
#
# OU avec un fichier values personnalis :
#   helm install mini chart/mini-api -f custom-values.yaml
#
# STRUCTURE :
# - image : configuration de l'image Docker
# - db : configuration de la base de donnees
# - ingress : configuration de l'Ingress
# =============================================================================

image:
  repository: mini-api  # Nom de l'image
  tag: "1.0"            # Tag de l'image
  pullPolicy: IfNotPresent  # Politique de pull (Always, IfNotPresent, Never)

db:
  user: app
  password: app
  name: app_db

ingress:
  enabled: true         # Activer/desactiver l'Ingress
  host: mini.local      # Nom de domaine
